version: '3.8'

services:
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qna-chatbot
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - HF_HOME=/app/.hf_cache
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - ./intro-to-ai:/app/intro-to-ai
      - ./.hf_cache:/app/.hf_cache

  create-embeddings:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: create-embeddings
    profiles:
      - tools
    env_file:
      - .env
    environment:
      - HF_HOME=/app/.hf_cache
      - TOKENIZERS_PARALLELISM=false
    volumes:
      - ./intro-to-ai:/app/intro-to-ai
      - ./.hf_cache:/app/.hf_cache
      - ./scripts:/app/scripts
      - ./data:/app/data
    command: python scripts/create_embeddings.py
